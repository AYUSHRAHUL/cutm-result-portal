<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Update Data</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">
  <h2 class="mb-4">Upload File to Update Data</h2>

  {% if error %}
  <div class="alert alert-danger">{{ error }}</div>
  {% endif %}
  {% if success %}
  <div class="alert alert-success">{{ success }}</div>
  {% endif %}

  <form method="POST" enctype="multipart/form-data" class="border p-4 bg-white rounded shadow-sm">
    <div class="mb-3">
      <label for="file" class="form-label">Choose File (.csv, .xls, .xlsx)</label>
      <input class="form-control" type="file" id="file" name="file" required>
    </div>
    <button type="submit" class="btn btn-primary">Upload & Update</button>
  </form>

  <div class="mt-3">
    <a href="/view_data" class="btn btn-secondary">View All Data</a>
  </div>
</div>

</body>
</html>
