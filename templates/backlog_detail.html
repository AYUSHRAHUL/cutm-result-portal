<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backlog Details | CUTM Result Portal</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background: #764ba2; color: #fff; min-height: 100vh; }
    .card { background: rgba(255,255,255,0.1); padding: 30px; margin: 30px auto; border-radius: 20px; }
    table { width: 100%; margin-top: 20px; color: #fff; background: rgba(255,255,255,0.1); border-radius: 15px; }
    th, td { padding: 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.2); }
    th { background: rgba(0,0,0,0.3); }
    tr:hover { background: rgba(255,255,255,0.1); }
    .message { color: #ff6b6b; font-weight: 600; margin-top: 15px; }
    .btn-back { margin-top: 20px; background: #ffdd57; color: #000; font-weight: 600; border-radius: 25px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card text-center">
      <h2>Backlog Details</h2>
      {% if message %}
        <p class="message">{{ message }}</p>
      {% endif %}

      {% if result %}
        <table>
          <thead>
            <tr>
              <th>Reg No</th>
              <th>Name</th>
              <th>Semester</th>
              <th>Subject Code</th>
              <th>Subject Name</th>
              <th>Credits</th>
              <th>Grade</th>
            </tr>
          </thead>
          <tbody>
            {% for row in result %}
              <tr>
                <td>{{ row[0] }}</td>
                <td>{{ row[1] }}</td>
                <td>{{ row[2] }}</td>
                <td>{{ row[3] }}</td>
                <td>{{ row[4] }}</td>
                <td>{{ row[7] }}</td>
                <td>{{ row[8] }}</td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      {% endif %}

      <a href="/backlog" class="btn btn-back">Back to Search</a>
    </div>
  </div>
</body>
</html>
